# ClickHouse 单机部署 / ClickHouse Standalone
# 启动: docker compose -f clickhouse-compose.yml up -d
# Start: docker compose -f clickhouse-compose.yml up -d

services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    restart: unless-stopped
    ports:
      # HTTP接口 / HTTP interface
      - "8123:8123"
      # 原生TCP接口 / Native TCP interface
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse123
      CLICKHOUSE_DB: demo_db
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # 限制内存防止OOM / Limit memory to prevent OOM
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  clickhouse_data:
    name: clickhouse_data
  clickhouse_logs:
    name: clickhouse_logs
