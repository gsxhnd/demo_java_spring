spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/demo_db?useSSL=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root123}
  jpa:
