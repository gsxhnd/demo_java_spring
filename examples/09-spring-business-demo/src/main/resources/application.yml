spring:
  application:
    name: spring-business-demo
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 6379
      password: redis123

app:
  display-name: Spring Business Demo
  cache:
    enabled: true
    ttl-seconds: 300
    redis-key-prefix: "biz:cache:"
  async:
    core-pool-size: 2
    max-pool-size: 5
    queue-capacity: 50
    thread-name-prefix: biz-async-
  storage:
    upload-dir: uploads
    public-url-prefix: /files
  scheduled:
    cancel-pending-orders-cron: "0 */1 * * * *"

server:
  port: 8080

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.example: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
