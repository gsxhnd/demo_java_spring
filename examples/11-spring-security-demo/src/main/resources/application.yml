spring:
  application:
    name: spring-security-demo
  datasource:
    url: jdbc:h2:mem:security_demo;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    secret: demo-java-spring-jwt-secret-key-at-least-32-chars-long
    access-token-expiration-minutes: 30
    refresh-token-expiration-days: 7
  casbin:
    model-path: classpath:casbin/model.conf
    policy-path: classpath:casbin/policy.csv

server:
  port: 8080

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.example: DEBUG
    org.springframework.security: INFO
