<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>STOMP Chat Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
        #messages { border: 1px solid #ccc; min-height: 240px; padding: 0.75rem; overflow-y: auto; }
        .row { margin-top: 0.75rem; display: flex; gap: 0.5rem; }
        input, button { padding: 0.5rem; }
        input { flex: 1; }
    </style>
</head>
<body>
<h1>WebSocket + STOMP 聊天演示</h1>
<p>端点 <code>/ws</code>，广播 <code>/topic/public</code>，发送 <code>/app/chat.send</code></p>
<div id="messages"></div>
<div class="row">
    <input id="sender" placeholder="昵称" value="guest"/>
    <input id="content" placeholder="消息内容"/>
    <button id="send">发送</button>
</div>
<script>
    const messagesEl = document.getElementById('messages');
    const socket = new SockJS('/ws');
    const stomp = Stomp.over(socket);
    stomp.debug = () => {};

    function append(text) {
        const div = document.createElement('div');
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    stomp.connect({}, () => {
        append('[已连接]');
        stomp.subscribe('/topic/public', (frame) => {
            const msg = JSON.parse(frame.body);
            append(`[${msg.sender}] ${msg.content}`);
        });
    }, (err) => append('[连接失败] ' + err));

    document.getElementById('send').onclick = () => {
        const sender = document.getElementById('sender').value || 'guest';
        const content = document.getElementById('content').value;
        if (!content) return;
        stomp.send('/app/chat.send', {}, JSON.stringify({
            sender: sender,
            content: content,
            timestamp: new Date().toISOString()
        }));
        document.getElementById('content').value = '';
    };
</script>
</body>
</html>
