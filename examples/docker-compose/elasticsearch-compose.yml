# Elasticsearch 8.15 + Kibana 单机部署 / Elasticsearch 8.15 + Kibana Standalone
# 启动: docker compose -f elasticsearch-compose.yml up -d
# Start: docker compose -f elasticsearch-compose.yml up -d

services:
  elasticsearch:
    image: elasticsearch:8.15.0
    container_name: elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      # 单节点模式 / Single-node mode
      discovery.type: single-node
      # 关闭安全认证 / Disable security
      xpack.security.enabled: "false"
      # JVM堆内存 / JVM heap size
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  kibana:
    image: kibana:8.15.0
    container_name: kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  es_data:
    name: es_data
