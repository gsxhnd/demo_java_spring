server:
  port: 8080

spring:
  application:
    name: spring-async-demo

  # Async Task Executor Configuration
  task:
    execution:
      pool:
        core-size: 8
        max-size: 16
        queue-capacity: 100
        keep-alive: 60s
      thread-name-prefix: async-task-
      shutdown:
        await-termination: true
        await-termination-period: 30s

  # Async Scheduling Configuration
    scheduling:
      pool:
        size: 4
      thread-name-prefix: async-scheduled-

# Logging
logging:
  level:
    com.example.async: DEBUG
