server:
  port: 8080

spring:
  application:
    name: spring-cache-demo

  datasource:
    url: jdbc:h2:mem:cache_demo
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false

  # Redis Configuration (L2 Cache)
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  h2:
    console:
      enabled: true
      path: /h2-console

# Cache Configuration
cache:
  # Caffeine L1 Cache Settings
  caffeine:
    spec: maximumSize=1000,expireAfterWrite=60s
  # Redis L2 Cache Settings
  redis:
    time-to-live: 600000    # 10 minutes
    key-prefix: "cache:"
  # Multi-level cache settings
  multi-level:
    l1-enabled: true
    l2-enabled: true

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,caches,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.example.cache: DEBUG
    org.springframework.cache: DEBUG
