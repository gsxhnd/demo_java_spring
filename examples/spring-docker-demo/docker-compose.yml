# =============================================================================
# Docker Compose 配置 - Spring Boot 应用 + MySQL + Redis
# =============================================================================

services:
  # Spring Boot 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spring-docker-demo
    ports:
      - "8080:8080"
    environment:
      # Spring Profile
      - SPRING_PROFILES_ACTIVE=prod
      # 数据库配置
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/docker_demo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=docker
      - SPRING_DATASOURCE_PASSWORD=docker123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      # Redis 配置
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"
    # 依赖服务
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3
    # 重启策略
    restart: unless-stopped
    # 网络
    networks:
      - demo-network

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: mysql-docker-demo
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root123
      - MYSQL_DATABASE=docker_demo
      - MYSQL_USER=docker
      - MYSQL_PASSWORD=docker123
    volumes:
      # 持久化数据
      - mysql-data:/var/lib/mysql
      # 初始化脚本
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    # 健康检查
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - demo-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: redis-docker-demo
    ports:
      - "6379:6379"
    volumes:
      # 持久化数据
      - redis-data:/data
    command: redis-server --appendonly yes
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - demo-network

# 网络定义
networks:
  demo-network:
    driver: bridge

# 持久化卷定义
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
