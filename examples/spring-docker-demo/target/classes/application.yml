server:
  port: 8080

spring:
  application:
    name: spring-docker-demo

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# Logging
logging:
  level:
    com.example.docker: INFO
    org.springframework.boot: INFO
