server:
  port: 8080

spring:
  application:
    name: spring-ioc-demo
  main:
    # 允许 Bean 定义覆盖（默认 false）
    allow-bean-definition-overriding: true
    # 全局懒加载（默认 false，加速启动但延迟发现问题）
    lazy-initialization: false
    # 允许循环依赖（默认 false，Spring 2.6+）
    allow-circular-references: false

# 调试模式：查看自动配置报告
debug: false

logging:
  level:
    com.example.ioc: DEBUG
    org.springframework.beans: DEBUG
