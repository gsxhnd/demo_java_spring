server:
  port: 8080

spring:
  application:
    name: spring-jpa-advanced-demo

  datasource:
    url: jdbc:h2:mem:jpa_advanced_demo;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.example.jpa: DEBUG
    org.hibernate.SQL: DEBUG
