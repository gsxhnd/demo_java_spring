server:
  port: 8080

spring:
  application:
    name: spring-transaction-demo
  datasource:
    # H2 内存数据库配置
    url: jdbc:h2:mem:transaction_demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    # 关闭 OSIV (Open Session In View)，建议生产环境关闭
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: true

# 事务日志配置（调试时启用）
logging:
  level:
    com.example.transaction: DEBUG
    org.springframework.transaction: TRACE
    org.springframework.jdbc.datasource.DataSourceTransactionManager: TRACE
