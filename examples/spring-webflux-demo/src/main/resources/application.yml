server:
  port: 8080

spring:
  application:
    name: spring-webflux-demo

  # R2DBC H2 配置
  r2dbc:
    url: r2dbc:h2:mem:///testdb?options=DB_CLOSE_DELAY=-1
    username: sa
    password:
    pool:
      initial-size: 5
      max-size: 10

  # Redis Reactive 配置
  data:
    redis:
      host: localhost
      port: 6379

  # SQL 初始化
  sql:
    init:
      mode: always

# Logging
logging:
  level:
    com.example.webflux: DEBUG
    org.springframework.r2dbc: DEBUG
